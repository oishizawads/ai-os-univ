vault:
  path: "C:/Users/kokao/iCloudDrive/iCloud~md~obsidian/obsidian-vault"
  inbox_dir: "inbox"
  papers_dir: "papers"
  blogs_dir: "blogs"
  notebooks_dir: "notebooks"
  ideas_dir: "ideas"
  raw_dir: "raw"              # 整形前の原文を保存（参照用）
  raw_vault_dir: "raw_vault"  # skip_format=true の記事をそのまま保存
  wiki_dir: "wiki"            # --compile で生成するコンセプトページ
  reports_dir: "reports"      # --report / --lint の出力先
  extra_knowledge_dirs:       # obsidian-vault 以外でも ChromaDB に登録するディレクトリ
    - "C:/workspace/ai-os/knowledge"

database:
  seen_urls_db: "data/seen_urls.db"
  chroma_dir: "data/chroma"
  collection_name: "knowledge_base"

claude:
  model: "claude-sonnet-4-20250514"
  max_tokens: 2000
  temperature: 0.3
  max_input_chars: 12000   # 全文取得(full_content_max_chars)に合わせて引き上げ

embedding:
  model: "intfloat/multilingual-e5-large"
  chunk_size: 500
  chunk_overlap: 50
  batch_size: 32

linking:
  similarity_threshold: 0.75  # これ以上の類似度で自動リンク
  max_links: 5                 # 1記事あたり最大リンク数

competitions:
  active_competitions:
    # - "RSNA 2026"
    # - "Kaggle Tabular Playground"

contexts:
  work:
    []
    # 例:
    # - name: "JBR需給最適化"
    #   keywords: ["需給予測", "最適化", "物流"]
    #   output: "C:/work/JBR/CONTEXT.md"
  comp:
    []
    # 例:
    # - name: "時系列異常検知"
    #   keywords: ["anomaly detection", "時系列", "LSTM"]
    #   output: "C:/comps/anomaly/CONTEXT.md"

logging:
  dir: "logs"
  level: "INFO"
